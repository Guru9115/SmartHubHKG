<div class="page" id="page-browser">
  <div class="page-title">Booking Portals</div>
  <div class="page-sub">Smart launcher — secure, fast, no iframe blocking</div>

  <!-- URL BAR -->
  <div class="browser-wrap">
    <div class="browser-bar">
      <input class="browser-url" id="browser-url" type="text"
        value="https://boo-nac.crane.aero"
        onkeydown="if(event.key==='Enter')openPortalManual()"/>
      <button class="browser-go" onclick="openPortalManual()">Open</button>
    </div>

    <!-- QUICK PORTALS -->
    <div class="quick-links">
      <span style="font-size:11px;color:var(--muted)">PORTALS:</span>

      <button class="qlink" onclick="openPortal('https://boo-nac.crane.aero','NAC Crane')">🦅 NAC Crane</button>
      <button class="qlink" onclick="openPortal('https://amadeus.com','Amadeus')">🔶 Amadeus</button>
      <button class="qlink" onclick="openPortal('https://www.travelport.com','Galileo')">🔷 Galileo</button>
      <button class="qlink" onclick="openPortal('https://www.sabre.com','Sabre')">⚡ Sabre</button>
      <button class="qlink" onclick="openPortal('https://www.emirates.com','Emirates')">✈ Emirates</button>
      <button class="qlink" onclick="openPortal('https://www.qatarairways.com','Qatar')">🇶🇦 Qatar</button>
      <button class="qlink" onclick="openPortal('https://www.turkishairlines.com','Turkish')">🇹🇷 Turkish</button>
    </div>

    <!-- STATUS PANEL -->
    <div style="padding:20px;text-align:center;color:var(--muted)">
      <div style="font-size:40px;margin-bottom:10px">🌐</div>
      <div style="font-size:14px;font-weight:600">Secure Portal Launcher</div>
      <div style="font-size:12px;margin-top:6px">
        Opens booking systems in new tab (no blocking / no blank screen)
      </div>
    </div>
  </div>

  <!-- SMART ACTION CARDS -->
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:20px">

    <div class="card">
      <div style="padding:16px">
        <div style="font-size:18px;margin-bottom:8px">🦅 NAC CRANE</div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:10px">
          Nepal Airlines Booking System
        </div>
        <button class="btn-sm btn-accent" style="width:100%"
          onclick="openPortal('https://boo-nac.crane.aero','NAC Crane')">
          Open System
        </button>
      </div>
    </div>

    <div class="card">
      <div style="padding:16px">
        <div style="font-size:18px;margin-bottom:8px">🔶 GDS SYSTEMS</div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:10px">
          Amadeus / Galileo / Sabre
        </div>
        <button class="btn-sm btn-accent" style="width:100%"
          onclick="openMultiGDS()">
          Open All GDS
        </button>
      </div>
    </div>

    <div class="card">
      <div style="padding:16px">
        <div style="font-size:18px;margin-bottom:8px">⚡ QUICK ACTION</div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:10px">
          Open last used portal
        </div>
        <button class="btn-sm btn-green" style="width:100%"
          onclick="openLastPortal()">
          Resume Work
        </button>
      </div>
    </div>

  </div>
</div>
